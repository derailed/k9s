plugins:
  #--- Create debug container for selected pod in current namespace
  # See https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/#ephemeral-container
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    inputs:
      - name: image
        label: Debug image
        type: dropdown
        required: true
        default: nicolaka/netshoot:v0.15
        options:
          - nicolaka/netshoot:v0.15
          - busybox:1.37
          - alpine:3.23
          - ubuntu:26.04
      - name: profile
        label: Debug profile
        type: dropdown
        required: true
        default: sysadmin
        options:
          - general
          - baseline
          - restricted
          - netadmin
          - sysadmin
          - legacy
      - name: share_processes
        label: Share processes
        type: bool
        required: true
        default: true
    args:
      - -c
      - >-
        kubectl debug -it --context $CONTEXT -n=$NAMESPACE $POD
        --target=$NAME
        --image=$INPUT_IMAGE
        --profile=$INPUT_PROFILE
        $([ "$INPUT_SHARE_PROCESSES" = "true" ] && echo "--share-processes")
        -- sh

