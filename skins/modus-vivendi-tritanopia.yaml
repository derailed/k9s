# -----------------------------------------------------------------------------
# Modus Vivendi Tritanopia skin for k9s
#
# Dark theme tuned for blue-yellow color deficiency (red/cyan axis).
# Theme by Protesilaos Stavrou: https://protesilaos.com/emacs/modus-themes
# Colors taken from the official modus-themes palette.
# -----------------------------------------------------------------------------

# Palette (semantic roles)...
foreground: &foreground "#ffffff"
background: &background "#000000"
panel: &panel "#1e1e1e"
subtle: &subtle "#303030"
faint: &faint "#989898"
border: &border "#646464"
accent: &accent "#00d3d0"
key: &key "#00d3d0"
string: &string "#00d3d0"
builtin: &builtin "#feacd0"
logo: &logo "#00d3d0"
cursor: &cursor "#ff5f5f"
addColor: &add "#44bc44"
newColor: &new "#00d3d0"
modifyColor: &modify "#feacd0"
errorColor: &error "#ff6740"
warnColor: &warn "#ff7f86"
killColor: &kill "#b6a0ff"

# Skin...
k9s:
  body:
    fgColor: *foreground
    bgColor: *background
    logoColor: *logo
  prompt:
    fgColor: *foreground
    bgColor: *panel
    suggestColor: *accent
  info:
    fgColor: *faint
    sectionColor: *accent
    cpuColor: *accent
    memColor: *builtin
  help:
    fgColor: *foreground
    bgColor: *panel
    keyColor: *key
    numKeyColor: *builtin
    sectionColor: *accent
  dialog:
    fgColor: *foreground
    bgColor: *panel
    buttonFgColor: *background
    buttonBgColor: *accent
    buttonFocusFgColor: *background
    buttonFocusBgColor: *builtin
    labelFgColor: *warn
    fieldFgColor: *foreground
  frame:
    border:
      fgColor: *border
      focusColor: *accent
    menu:
      fgColor: *foreground
      keyColor: *key
      numKeyColor: *builtin
    crumbs:
      fgColor: *background
      bgColor: *accent
      activeColor: *warn
    status:
      newColor: *new
      modifyColor: *modify
      addColor: *add
      errorColor: *error
      pendingColor: *warn
      highlightColor: *accent
      killColor: *kill
      completedColor: *faint
    title:
      fgColor: *accent
      bgColor: *panel
      highlightColor: *builtin
      counterColor: *foreground
      filterColor: *key
  views:
    charts:
      bgColor: *background
      defaultDialColors:
        - *accent
        - *error
      defaultChartColors:
        - *accent
        - *error
    table:
      fgColor: *foreground
      bgColor: *background
      cursorFgColor: *background
      cursorBgColor: *cursor
      markColor: *warn
      header:
        fgColor: *faint
        bgColor: *background
        sorterColor: *accent
    xray:
      fgColor: *foreground
      bgColor: *background
      cursorColor: *cursor
      cursorTextColor: *background
      graphicColor: *builtin
      showIcons: false
    yaml:
      keyColor: *key
      colonColor: *faint
      valueColor: *foreground
    logs:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *background
        bgColor: *accent
        toggleOnColor: *add
        toggleOffColor: *faint
    help:
      fgColor: *foreground
      bgColor: *panel
      indicator:
        fgColor: *accent
